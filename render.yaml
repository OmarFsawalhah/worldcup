services:
  - type: web
    name: worldcup-predictor
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python scripts/seed.py && python scripts/seed_knockout_matches.py
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: worldcup-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FOOTBALL_DATA_API_KEY
        sync: false  # set this manually in Render dashboard after first deploy
      - key: SKIP_DB_INIT
        value: "1"   # schema is created during build; skip at boot for fast port-bind
      # Web Push (phone-tray notifications). Generate with:
      #   python scripts/generate_vapid_keys.py
      # then paste the two values in the Render dashboard.
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_CLAIM_EMAIL
        sync: false

databases:
  - name: worldcup-db
    plan: free
    databaseName: worldcup
    user: worldcup
