services:
  - type: web
    name: worldcup-predictor
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python scripts/seed.py
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: worldcup-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FOOTBALL_DATA_API_KEY
        sync: false  # set this manually in Render dashboard after first deploy

databases:
  - name: worldcup-db
    plan: free
    databaseName: worldcup
    user: worldcup
