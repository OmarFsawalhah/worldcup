{% extends "base.html" %}
{% block content %}
<div class="max-w-sm mx-auto card-pitch mt-8">
  <h1 class="text-xl font-bold mb-4">{{ t('auth.login_title') }}</h1>
  <form method="post" class="space-y-3">
    <div>
      <label class="block text-sm font-medium">{{ t('auth.username') }}</label>
      <input name="username" required class="w-full border rounded px-3 py-2">
    </div>
    <div>
      <label class="block text-sm font-medium">{{ t('auth.password') }}</label>
      <input type="password" name="password" required class="w-full border rounded px-3 py-2">
    </div>
    <button class="w-full bg-emerald-700 text-white py-2 rounded hover:bg-emerald-800">{{ t('auth.submit_login') }}</button>
  </form>
  <p class="mt-4 text-sm"><a href="{{ url_for('auth.register') }}" class="text-emerald-700 underline">{{ t('auth.need_account') }}</a></p>
</div>
{% endblock %}
