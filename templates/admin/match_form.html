{% extends "base.html" %}
{% block content %}
<div class="mb-5">
  <div class="text-xs uppercase tracking-[0.2em] text-yellow-400 font-bold mb-1">Admin</div>
  <h1 class="page-title text-2xl sm:text-3xl">{{ t('admin.edit_match') if match else t('admin.add_match') }}</h1>
</div>

<form method="post" class="card-pitch space-y-4 max-w-xl">
  <div class="grid grid-cols-2 gap-3">
    <div>
      <label class="label">{{ t('admin.stage') }}</label>
      <select name="stage" required class="input">
        {% for s in stages %}
          <option value="{{ s }}" {{ 'selected' if match and match.stage == s }}>{{ s }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="label">{{ t('admin.group') }}</label>
      <input name="group_letter" maxlength="1" value="{{ match.group_letter if match else '' }}" class="input uppercase">
    </div>
  </div>
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
    <div>
      <label class="label">{{ t('admin.home_team') }}</label>
      <select name="home_team_id" required class="input">
        {% for tm in teams %}
          <option value="{{ tm.id }}" {{ 'selected' if match and match.home_team_id == tm.id }}>{{ tm.name_en }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="label">{{ t('admin.away_team') }}</label>
      <select name="away_team_id" required class="input">
        {% for tm in teams %}
          <option value="{{ tm.id }}" {{ 'selected' if match and match.away_team_id == tm.id }}>{{ tm.name_en }}</option>
        {% endfor %}
      </select>
    </div>
  </div>
  <div>
    <label class="label">{{ t('admin.kickoff') }}</label>
    <input type="datetime-local" name="kickoff_utc" required
           value="{{ match.kickoff_utc.strftime('%Y-%m-%dT%H:%M') if match else '' }}" class="input">
  </div>
  <div>
    <label class="label">{{ t('admin.venue') }}</label>
    <input name="venue" value="{{ match.venue if match else '' }}" class="input">
  </div>
  <div class="flex gap-2 pt-2">
    <button class="btn btn-primary">{{ t('admin.save') }}</button>
    <a href="{{ url_for('admin.matches') }}" class="btn btn-soft">{{ t('admin.cancel') }}</a>
  </div>
</form>
{% endblock %}
