{% extends "base.html" %}
{% block content %}
<div class="max-w-sm mx-auto card-pitch mt-8">
  <h1 class="text-xl font-display tracking-wider mb-2">{{ t('auth.change_password_title') }}</h1>
  {% if current_user.must_change_password %}
    <p class="text-sm text-amber-700 bg-amber-50 border border-amber-200 rounded p-2 mb-4">
      {{ t('auth.first_login_notice') }}
    </p>
  {% endif %}
  <form method="post" class="space-y-3">
    <div>
      <label class="block text-sm font-medium">{{ t('auth.current_password') }}</label>
      <input type="password" name="current_password" required class="w-full border rounded px-3 py-2">
    </div>
    <div>
      <label class="block text-sm font-medium">{{ t('auth.new_password') }}</label>
      <input type="password" name="new_password" required minlength="6" class="w-full border rounded px-3 py-2">
    </div>
    <div>
      <label class="block text-sm font-medium">{{ t('auth.new_password_confirm') }}</label>
      <input type="password" name="new_password_confirm" required minlength="6" class="w-full border rounded px-3 py-2">
    </div>
    <button class="w-full bg-emerald-700 text-white py-2 rounded hover:bg-emerald-800">{{ t('auth.change_password_submit') }}</button>
  </form>
</div>
{% endblock %}
