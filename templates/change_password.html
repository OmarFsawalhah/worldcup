{% extends "base.html" %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
  <div class="max-w-md w-full">
    <div class="text-center mb-6">
      <div class="inline-flex w-14 h-14 rounded-2xl bg-gradient-to-br from-indigo-400 to-indigo-600 items-center justify-center shadow-lg shadow-indigo-500/40 mb-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></svg>
      </div>
      <h1 class="page-title text-2xl">{{ t('auth.change_password_title') }}</h1>
    </div>

    {% if current_user.must_change_password %}
    <div class="flash flash-error mb-4">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>{{ t('auth.first_login_notice') }}</span>
    </div>
    {% endif %}

    <div class="card-pitch">
      <form method="post" class="space-y-4">
        <div>
          <label class="label">{{ t('auth.current_password') }}</label>
          <input type="password" name="current_password" required autocomplete="current-password" class="input" placeholder="••••••••">
        </div>
        <div>
          <label class="label">{{ t('auth.new_password') }}</label>
          <input type="password" name="new_password" required minlength="6" autocomplete="new-password" class="input" placeholder="••••••••">
        </div>
        <div>
          <label class="label">{{ t('auth.new_password_confirm') }}</label>
          <input type="password" name="new_password_confirm" required minlength="6" autocomplete="new-password" class="input" placeholder="••••••••">
        </div>
        <button class="btn btn-primary w-full">{{ t('auth.change_password_submit') }}</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
